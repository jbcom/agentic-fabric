[tox]
requires =
    tox>=4.56.1
    tox-uv>=1.35.2
    tox-gh>=1.7.1
env_list =
    lint
    typecheck
    audit
    py311
    py312
    py313
    py314
    coverage
    plugin
    examples
    docs
    build
min_version = 4.56.1
skip_missing_interpreters = false

[gh]
python =
    3.11 = py311
    3.12 = py312
    3.13 = py313
    3.14 = py314

[testenv]
description = Run agentic-fabric package tests
runner = uv-venv-runner
package = skip
deps = -e packages/agentic-fabric[tests]
       -e packages/pytest-agentic-fabric[tests]
commands = pytest packages/agentic-fabric/tests {posargs}

[testenv:py{311,312,313,314}]
description = Run agentic-fabric tests on Python {base_python}
commands = {[testenv]commands}

[testenv:lint]
description = Lint source, tests, examples, docs, and workflow docs
runner = uv-venv-runner
package = skip
deps = ruff>=0.15.20
commands = ruff check packages/agentic-fabric/src packages/agentic-fabric/tests packages/agentic-fabric/examples packages/pytest-agentic-fabric/src packages/pytest-agentic-fabric/tests docs AGENTS.md README.md

[testenv:typecheck]
description = Type-check public package code
runner = uv-venv-runner
package = skip
deps =
    -e packages/agentic-fabric[typing]
    -e packages/pytest-agentic-fabric[typing]
commands = mypy --config-file packages/agentic-fabric/pyproject.toml packages/agentic-fabric/src packages/pytest-agentic-fabric/src

[testenv:plugin]
description = Run pytest-agentic-fabric tests
runner = uv-venv-runner
package = skip
deps =
    -e packages/agentic-fabric
    -e packages/pytest-agentic-fabric[tests]
    pytest-mock>=3.15.1
commands = pytest packages/pytest-agentic-fabric/tests {posargs}

[testenv:examples]
description = Run shipped examples as standalone scripts
runner = uv-venv-runner
package = skip
deps = -e packages/agentic-fabric
commands =
    python packages/agentic-fabric/examples/discovery_workflow.py
    python packages/agentic-fabric/examples/tool_registry.py
    python packages/agentic-fabric/examples/runtime_context.py
    python packages/agentic-fabric/examples/mcp_adapters.py

[testenv:audit]
description = Audit resolved optional, test, and typing dependencies
runner = uv-venv-runner
package = skip
deps =
    -e packages/agentic-fabric[langgraph,strands,mcp,scraping,tests,typing]
    -e packages/pytest-agentic-fabric[tests,typing]
    pip-audit==2.10.1
commands = pip-audit --skip-editable

[testenv:coverage]
description = Enforce full coverage for both publishable packages
runner = uv-venv-runner
package = skip
deps =
    -e packages/agentic-fabric[tests]
    -e packages/pytest-agentic-fabric[tests]
commands =
    coverage erase
    coverage run --source=agentic_fabric -m pytest packages/agentic-fabric/tests
    coverage report --show-missing --skip-covered --fail-under=100
    coverage erase
    coverage run --source=pytest_agentic_fabric -m pytest packages/pytest-agentic-fabric/tests
    coverage report --show-missing --skip-covered --fail-under=100

[testenv:docs]
description = Build Sphinx docs and generated autodoc2 API reference
runner = uv-venv-runner
package = skip
deps = -e packages/agentic-fabric[docs]
commands_pre = python -c "import shutil; shutil.rmtree('docs/_build/html', ignore_errors=True)"
commands = sphinx-build -W -E -b html docs docs/_build/html

[testenv:build]
description = Build source and wheel distributions for both publishable packages
runner = uv-venv-runner
package = skip
deps =
allowlist_externals = uv
commands =
    uv build --package agentic-fabric --out-dir dist/agentic-fabric --clear
    uv build --package pytest-agentic-fabric --out-dir dist/pytest-agentic-fabric --clear
