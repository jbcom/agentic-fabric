[tox]
env_list = lint,typecheck,py311,py312,py313,py314,plugin,docs,build
requires =
    tox>=4.0
    tox-uv>=1.16

[testenv]
runner = uv-venv-runner
package = skip
deps = -e packages/agentic-fabric[tests]
commands = pytest packages/agentic-fabric/tests {posargs}

[testenv:lint]
runner = uv-venv-runner
package = skip
deps = ruff>=0.8.0
commands = ruff check packages/agentic-fabric/src packages/agentic-fabric/tests packages/agentic-fabric/examples packages/pytest-agentic-fabric/src packages/pytest-agentic-fabric/tests docs AGENTS.md README.md

[testenv:typecheck]
runner = uv-venv-runner
package = skip
deps =
    -e packages/agentic-fabric[typing]
    -e packages/pytest-agentic-fabric[typing]
commands = mypy --config-file packages/agentic-fabric/pyproject.toml packages/agentic-fabric/src packages/pytest-agentic-fabric/src

[testenv:plugin]
runner = uv-venv-runner
package = skip
deps =
    -e packages/agentic-fabric
    -e packages/pytest-agentic-fabric[tests]
commands = pytest packages/pytest-agentic-fabric/tests {posargs}

[testenv:docs]
runner = uv-venv-runner
package = skip
deps = -e packages/agentic-fabric[docs]
commands_pre = python -c "import shutil; shutil.rmtree('docs/_build/html', ignore_errors=True)"
commands = sphinx-build -W -E -b html docs docs/_build/html

[testenv:build]
runner = uv-venv-runner
package = skip
deps = uv>=0.11.19
commands = uv build --all-packages --out-dir dist --clear
