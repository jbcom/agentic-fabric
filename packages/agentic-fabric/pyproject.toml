[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentic-fabric"
version = "1.1.0"
description = "Framework-agnostic agent fabric orchestration for CrewAI, LangGraph, Strands, local CLI runners, and vendor-fabric tools"
requires-python = ">=3.11"
license = { text = "MIT" }
readme = "README.md"
authors = [{ name = "Jon Bogaty", email = "jon@jonbogaty.com" }]
maintainers = [{ name = "Jon Bogaty", email = "jon@jonbogaty.com" }]
keywords = ["crewai", "langgraph", "strands", "ai-agents", "multi-agent", "orchestration", "vendor-fabric"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]
dependencies = [
    "pyyaml>=6.0.3",
]

[project.optional-dependencies]
langgraph = ["langgraph>=0.2.0", "langchain-anthropic>=0.3.0", "langchain-ollama>=0.3.0"]
strands = ["strands-agents[ollama]>=0.1.0"]
mcp = ["mcp>=1.0.0"]
scraping = ["beautifulsoup4>=4.12.0", "requests>=2.31.0"]
tests = [
    "coverage[toml]>=7.14.3",
    "pytest-agentic-fabric[tests]",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "pytest>=9.1.1",
    "pytest-timeout>=2.4.0",
    "pytest-xdist>=3.8.0",
]
typing = [
    "mypy>=2.1.0",
    "types-PyYAML>=6.0.12.20260518",
    "types-requests>=2.33.0.20260518",
]
dev = [
    "agentic-fabric[tests,typing]",
    "ruff>=0.15.20",
]
docs = [
    "furo>=2025.12.19",
    "myst-parser>=5.1.0,<6.0.0",
    "sphinx>=8.2.3,<10.0.0",
    "sphinx-autodoc2>=0.5.0",
    "sphinx-copybutton>=0.5.2",
]

[project.scripts]
agentic-fabric = "agentic_fabric.main:main"
agentic-fabric-meshy-mcp = "agentic_fabric.tools.meshy_mcp:main"
agentic-fabric-vendor-mcp = "agentic_fabric.tools.vendor_mcp:main"

[project.urls]
Documentation = "https://jonbogaty.com/agentic-fabric/"
Issues = "https://github.com/jbcom/agentic-fabric/issues"
Source = "https://github.com/jbcom/agentic-fabric"
Changelog = "https://github.com/jbcom/agentic-fabric/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/agentic_fabric"]

[tool.pytest.ini_options]
addopts = ["-ra", "--strict-markers", "--strict-config"]
testpaths = ["tests"]
xfail_strict = true
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
timeout = 30
timeout_method = "thread"
markers = [
    "crewai: tests that require CrewAI runtime dependencies",
    "e2e: end-to-end tests that require external runtime dependencies",
    "langgraph: tests that require LangGraph runtime dependencies",
    "strands: tests that require Strands runtime dependencies",
    "vendor_fabric: tests that require vendor-fabric runtime dependencies",
]

[tool.coverage.run]
branch = true
parallel = true
source = ["agentic_fabric"]

[tool.coverage.report]
show_missing = true
skip_covered = true

[tool.ruff]
target-version = "py311"
line-length = 120
src = ["src", "tests", "examples"]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "ANN",
    "ARG",
    "BLE001",
    "C901",
    "COM",
    "D105",
    "D205",
    "D415",
    "D417",
    "DTZ007",
    "E402",
    "E501",
    "EM",
    "ERA001",
    "FBT",
    "FIX",
    "G",
    "PERF",
    "PLC0415",
    "PLR0124",
    "PLR0911",
    "PLR0912",
    "PLR0913",
    "PLR0915",
    "PLR2004",
    "PLW0603",
    "PTH",
    "RET505",
    "RUF012",
    "S105",
    "S110",
    "S310",
    "S603",
    "SLF001",
    "TCH",
    "TD",
    "TID252",
    "TRY003",
    "TRY300",
    "TRY301",
    "TRY401",
]

[tool.ruff.lint.per-file-ignores]
"examples/**" = ["T201"]
"tests/**" = ["B018", "BLE", "D", "DTZ", "INP001", "LOG001", "N802", "N803", "N806", "PLC0415", "PT", "S", "SIM117", "TRY"]
"src/agentic_fabric/main.py" = ["T201"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
lines-between-types = 1
lines-after-imports = 2

[tool.mypy]
python_version = "3.11"
pretty = true
show_error_codes = true
ignore_missing_imports = true
warn_return_any = false
warn_unused_configs = true
exclude = ["tests/e2e/.*", "tests/.*/conftest.py"]

[[tool.mypy.overrides]]
module = [
    "bs4",
    "crewai",
    "crewai.*",
    "langchain_anthropic",
    "langgraph",
    "langgraph.*",
    "strands",
]
ignore_missing_imports = true
